name: Terraform Main Apply

on:
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform-main-apply.yml"

jobs:
  terraform-apply:
    runs-on: ubuntu-latest

    env:
      TF_CLOUD_ORGANIZATION: your-tfc-org
      TF_API_TOKEN: ${{ secrets.TF_API_TOKEN }}
      TF_WORKSPACE: infra-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      # -------------------------
      # Formatting
      # -------------------------
      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      # -------------------------
      # TFLint (GCP)
      # -------------------------
      - name: Install TFLint
        run: |
          curl -s https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash

      - name: Setup TFLint Plugins
        working-directory: infra
        run: tflint --init

      - name: Run TFLint
        working-directory: infra
        run: tflint --recursive
      - name: Run checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra
          framework: terraform 
          skip_check: CKV_GCP_19,CKV_GCP_29  # Optional: Skip specific checks
          output_format: cli
          download_external_modules: true
          soft_fail: fail  # Won't fail the build but will show warnings

      # -------------------------
      # Terraform Cloud Plan + Apply
      # -------------------------
      - name: Terraform Init
        working-directory: infra
        run: terraform init

      # -------------------------
      # Validation
      # -------------------------
      - name: Terraform Validate
        working-directory: infra
        run: terraform validate
        
      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -input=false -out=tfplan

#      - name: Terraform Apply
#        working-directory: infra
#        run: terraform apply -input=false tfplan
